# Operator Service Configuration

# Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/omnicharge_operator_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000
spring.data.redis.connect-timeout=1000

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Resilience4J Circuit Breaker Config for Redis
resilience4j.circuitbreaker.instances.redis.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.redis.slidingWindowSize=10
resilience4j.circuitbreaker.instances.redis.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.redis.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.redis.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.redis.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.redis.failureRateThreshold=50

# Numverify API Configuration
numverify.api.key=${NUMVERIFY_API_KEY}
numverify.api.url=http://apilayer.net/api/validate

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
