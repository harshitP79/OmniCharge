# Recharge Service Configuration

# Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/omnicharge_recharge_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000
spring.data.redis.connect-timeout=1000
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.operatorService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.operatorService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.operatorService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.operatorService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.operatorService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.operatorService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.operatorService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.operatorService.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.operatorService.slowCallDurationThreshold=10s
resilience4j.circuitbreaker.instances.operatorService.recordExceptions=java.io.IOException,java.util.concurrent.TimeoutException
resilience4j.circuitbreaker.instances.operatorService.ignoreExceptions=com.omnicharge.common.exception.BadRequestException

resilience4j.circuitbreaker.instances.paymentService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.paymentService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.paymentService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.paymentService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.paymentService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentService.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.paymentService.slowCallDurationThreshold=5s

resilience4j.circuitbreaker.instances.userService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.userService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.userService.slowCallDurationThreshold=5s

# Resilience4j Retry Configuration
resilience4j.retry.instances.operatorService.maxAttempts=3
resilience4j.retry.instances.operatorService.waitDuration=1s
resilience4j.retry.instances.operatorService.enableExponentialBackoff=true
resilience4j.retry.instances.operatorService.exponentialBackoffMultiplier=2

resilience4j.retry.instances.paymentService.maxAttempts=2
resilience4j.retry.instances.paymentService.waitDuration=1s
resilience4j.retry.instances.paymentService.enableExponentialBackoff=true
resilience4j.retry.instances.paymentService.exponentialBackoffMultiplier=2

resilience4j.retry.instances.userService.maxAttempts=3
resilience4j.retry.instances.userService.waitDuration=500ms
resilience4j.retry.instances.userService.enableExponentialBackoff=true
resilience4j.retry.instances.userService.exponentialBackoffMultiplier=2

# Feign Client Configuration
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=full
feign.circuitbreaker.enabled=false
logging.level.com.omnicharge.recharge.client=DEBUG
logging.level.feign=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,prometheus
management.endpoint.health.show-details=always
