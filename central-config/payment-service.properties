# Payment Service Configuration

# Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/omnicharge_payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.razorpayService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.razorpayService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.razorpayService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.razorpayService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.razorpayService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.razorpayService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.razorpayService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.razorpayService.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.razorpayService.slowCallDurationThreshold=5s

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
