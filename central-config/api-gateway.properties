# API Gateway Configuration

# Gateway Routes Configuration
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**,/api/admin/users/**,/api/admin/dashboard/**

spring.cloud.gateway.server.webflux.routes[1].id=operator-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://operator-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/operators/**,/api/plans/**,/api/admin/operators/**

spring.cloud.gateway.server.webflux.routes[2].id=recharge-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://recharge-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/recharges/**,/api/admin/recharges/**

spring.cloud.gateway.server.webflux.routes[3].id=payment-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments/**,/api/admin/payments/**

spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/notifications/**,/api/admin/notifications/**

# CORS Configuration
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000

# Rate Limiting Configuration
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.burstCapacity=150
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.requestedTokens=1

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,gateway,prometheus
management.endpoint.health.show-details=always
