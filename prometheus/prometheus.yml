global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          service: 'api-gateway'

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']
        labels:
          service: 'user-service'

  - job_name: 'operator-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['operator-service:8082']
        labels:
          service: 'operator-service'

  - job_name: 'recharge-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['recharge-service:8083']
        labels:
          service: 'recharge-service'

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8084']
        labels:
          service: 'payment-service'

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']
        labels:
          service: 'notification-service'

  - job_name: 'logging-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['logging-service:8086']
        labels:
          service: 'logging-service'

  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']
        labels:
          service: 'config-server'

  - job_name: 'eureka-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['eureka-server:8761']
        labels:
          service: 'eureka-server'
