input {
  file {
    path => "/logs/**/*.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
      max_lines => 500
      max_bytes => "10 MiB"
    }
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/usr/share/logstash/data/completed.log"
  }
}

filter {
  # Parse the main log line format
  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:timestamp}\s+%{WORD:level}\s+\[%{DATA:service},%{DATA:traceId},%{DATA:spanId}\]\s+\[%{DATA:thread}\]\s+%{DATA:logger}\s+:\s+%{GREEDYDATA:log_message}",
        "%{TIMESTAMP_ISO8601:timestamp}\s+%{WORD:level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:service}\]\s+\[%{DATA:traceId},%{DATA:spanId}\]\s+\[%{DATA:thread}\]\s+%{DATA:logger}\s+:\s+%{GREEDYDATA:log_message}",
        "%{TIMESTAMP_ISO8601:timestamp}\s+%{WORD:level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:service}\]\s+.*\[%{DATA:thread}\]\s+%{DATA:logger}\s+:\s+%{GREEDYDATA:log_message}"
      ]
    }
  }

  # Parse timestamp into @timestamp field
  date {
    match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "ISO8601" ]
    target => "@timestamp"
    timezone => "UTC"
  }

  # Extract key-value pairs from log_message if present (format: key=value | key=value)
  if [log_message] =~ /\|/ {
    kv {
      source => "log_message"
      field_split => "|"
      value_split => "="
      trim_key => " "
      trim_value => " "
      target => "context"
    }
  }

  # Clean up trace/span IDs (replace "-" with null)
  if [traceId] == "-" {
    mutate {
      remove_field => ["traceId"]
    }
  }

  if [spanId] == "-" {
    mutate {
      remove_field => ["spanId"]
    }
  }

  # Add file metadata
  mutate {
    add_field => {
      "log_source" => "%{[log][file][path]}"
    }
  }

  # Infallibly extract service_name from directory structure (/logs/logging-service/logging-service.log)
  grok {
    match => { "log_source" => "/logs/%{DATA:service_name}/.*\.log" }
    tag_on_failure => [] # Do not flag if it's all-services.log
  }

  # Fallback: If not parsed from path, use the parsed grok 'service' field
  if ![service_name] and [service] {
    mutate {
      add_field => { "service_name" => "%{service}" }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["log", "event", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index => "omnicharge-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
    template_name => "omnicharge-logs"
    template_overwrite => true
  }

  # Debug output (optional - comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
